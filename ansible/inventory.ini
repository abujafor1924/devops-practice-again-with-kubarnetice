# ==============================================================================
# ANSIBLE INVENTORY FILE (INI FORMAT)
# ==============================================================================
# The Inventory file lists the hosts (servers) in your infrastructure.
# You can organize servers into groups (e.g. [webservers], [dbservers]) and
# configure variables specific to hosts or groups.
# ==============================================================================

# Group: webservers
# Defines a list of servers that will host our web application.
[webservers]
# Host alias: app-server-1
# ansible_host: The public IP or domain name of the remote server.
# ansible_user: The username used to SSH into the remote machine (e.g., ubuntu for AWS).
# ansible_ssh_private_key_file: Path to the private SSH key file (.pem) for authentication.
app-server-1 ansible_host=54.210.12.89 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/my-aws-key.pem

# Group: dbservers
# Defines servers running databases (if you deploy Postgres on a raw VM).
[dbservers]
# db-server-1 ansible_host=54.210.12.90 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/my-aws-key.pem

# ==============================================================================
# GROUP VARIABLES
# ==============================================================================
# Sets variables that apply to all hosts inside this inventory.
# ==============================================================================
[all:vars]
ansible_connection=ssh     # Instructs Ansible to connect using standard SSH
ansible_port=22            # Default SSH port
ansible_become=yes         # Automatically run commands with sudo privileges (root access)
