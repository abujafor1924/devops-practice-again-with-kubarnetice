# ==============================================================================
# MAIN ANSIBLE PLAYBOOK
# ==============================================================================
# A Playbook is a YAML file containing a list of 'plays'. A play maps a group of
# hosts to a list of tasks that configure the system or deploy code.
# ==============================================================================

- name: Deploy Django Application Stack to Web Servers
  hosts: webservers         # Target host group defined in inventory.ini
  become: true              # Execute tasks with sudo/root privileges

  # Play-level variables
  vars:
    project_dir: "/home/ubuntu/devops-practice"
    git_repo: "https://github.com/username/devops-practice.git"

  # ============================================================================
  # ROLES STAGE
  # ============================================================================
  # Roles allow you to load modular tasks, handlers, and variables.
  # We call our custom role 'docker' to install and configure Docker.
  # ============================================================================
  roles:
    - docker

  # ============================================================================
  # TASKS STAGE
  # ============================================================================
  # Custom tasks executed sequentially after the roles have finished.
  # ============================================================================
  tasks:
    - name: Ensure git and pip are installed
      apt:
        name:
          - git
          - python3-pip
        state: present
        update_cache: yes    # Runs 'apt-get update' before installing

    - name: Clone the project Git repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ project_dir }}"
        version: "main"      # Branch to checkout
        force: yes           # Overwrite local modifications if any

    - name: Write project environment file (.env) from template
      copy:
        dest: "{{ project_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: '0600'         # Restricts permissions (read/write only for owner)
        content: |
          POSTGRES_DB=mydatabase
          POSTGRES_USER=myuser
          POSTGRES_PASSWORD=mypassword
          POSTGRES_PORT=5435
          POSTGRES_HOST=localhost
          DEBUG=True
          SECRET_KEY=django-insecure-devops-practice-default-secret-key-1234567890
          ALLOWED_HOSTS=localhost,127.0.0.1
          DATABASE_URL=postgres://myuser:mypassword@localhost:5435/mydatabase
          REDIS_PORT=6383
          CELERY_BROKER_URL=redis://localhost:6383/0
          CELERY_RESULT_BACKEND=redis://localhost:6383/0
          APP_PORT=5040
          NGINX_PORT=8080
          NGINX_SSL_PORT=8443
          PROMETHEUS_PORT=9090
          GRAFANA_PORT=3000
          CADVISOR_PORT=8082
          FLOWER_PORT=5555

    - name: Start the Docker Compose application stack
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}/devops"
        files:
          - "docker-compose.yml"
        state: present
        build: always
      # Note: In Ansible, community.docker modules are used to run Docker Compose commands
