# ==============================================================================
# INSTALLATION TASKS FOR DOCKER ROLE
# ==============================================================================
# Performs step-by-step tasks to install Docker CE on Debian/Ubuntu systems.
# ==============================================================================

- name: Install package prerequisites
  apt:
    name: "{{ docker_required_packages }}"
    state: present
    update_cache: yes

- name: Create directory for Docker APT keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
    keyring: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository to APT sources
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker

- name: Install Docker CE and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Configure Docker daemon settings (daemon.json)
  copy:
    dest: "{{ docker_daemon_config_path }}"
    owner: root
    group: root
    mode: '0644'
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  # Handlers: Triggered using notify when this configuration file changes.
  # This avoids restarting Docker on every run unless settings are modified!
  notify: Restart Docker Daemon

- name: Ensure Docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: yes
