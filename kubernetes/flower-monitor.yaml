# ==============================================================================
# CELERY FLOWER MONITOR DEPLOYMENT
# ==============================================================================
# Deploys Flower, a real-time web dashboard to monitor Celery task progress,
# workers status, and error trackings.
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-monitor
  labels:
    app: flower
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower
  template:
    metadata:
      labels:
        app: flower
    spec:
      containers:
        - name: flower
          image: devops-flower:latest
          imagePullPolicy: Never
          command:
            - "celery"
            - "-A"
            - "config"
            - "flower"
            - "--port=5555"
          ports:
            - containerPort: 5555
              name: flower
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-db
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(POSTGRES_DB)"
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CELERY_RESULT_BACKEND
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "150m"

---

# ==============================================================================
# FLOWER SERVICE
# ==============================================================================
# Exposes Flower externally using NodePort so you can access it on the host machine.
# ==============================================================================

apiVersion: v1
kind: Service
metadata:
  name: flower-service
  labels:
    app: flower
spec:
  type: NodePort             # Exposes the service on a static port on each Node's IP
  ports:
    - port: 5555
      targetPort: 5555
      nodePort: 30055        # Bind to port 30055 on host (http://<minikube-ip>:30055)
      name: flower
  selector:
    app: flower
