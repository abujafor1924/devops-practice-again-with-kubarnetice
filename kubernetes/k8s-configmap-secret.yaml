# ==============================================================================
# KUBERNETES SECRETS AND CONFIGMAPS
# ==============================================================================
# In Kubernetes, ConfigMaps are used to store non-sensitive configuration data
# as key-value pairs. Secrets are used to store sensitive data like passwords,
# tokens, or keys. Secret data is base64-encoded to prevent accidental reading.
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets          # Unique name within the namespace to refer to this secret
  labels:
    app: devops-practice
type: Opaque                 # Default type for user-defined general secrets
data:
  # Sensitive database parameters must be base64-encoded:
  # To encode: echo -n 'myuser' | base64
  postgres-user: bXl1c2Vy          # Decodes to: myuser
  postgres-password: bXlwYXNzd29yZA==  # Decodes to: mypassword
  postgres-db: bXlkYXRhYmFzZQ==      # Decodes to: mydatabase

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config           # Unique name to refer to this ConfigMap configuration
  labels:
    app: devops-practice
data:
  # Non-sensitive variables stored as plain-text strings
  DEBUG: "True"
  SECRET_KEY: "django-insecure-devops-practice-default-secret-key-1234567890"
  ALLOWED_HOSTS: "*"
  
  # PostgreSQL internal connection parameters.
  # Note: Host refers to the ClusterIP Service DNS name ('postgres-service').
  # Kubernetes provides built-in DNS resolving so containers can communicate using service names.
  DB_HOST: "postgres-service"
  DB_PORT: "5432"

  # Redis internal connection URL.
  # Note: Host refers to the ClusterIP Service name ('redis-service').
  REDIS_HOST: "redis-service"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
