# ==============================================================================
# UPSTREAM LOAD BALANCER CONFIGURATION
# ==============================================================================
# Upstream directive defines a pool of servers Nginx can distribute traffic to.
# By default, Nginx uses Round-Robin balancing. You can add multiple server IPs here.
# ==============================================================================

upstream django_servers {
    server web:8000;  # Resolves to the Django container IP inside docker-compose network
}

# ==============================================================================
# HTTP SERVER (PORT 80) - REDIRECT TO HTTPS
# ==============================================================================
# Catch-all server to redirect unsecured HTTP requests automatically to HTTPS.
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Permanent 301 Redirect to HTTPS
    return 301 https://$host$request_uri;
}

# ==============================================================================
# HTTPS SECURE SERVER (PORT 443)
# ==============================================================================
# Handles encrypted HTTPS traffic, serves static files, and compresses responses.
# ==============================================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;

    # SSL Certificate File Paths (Mounted inside the container)
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Secure SSL Protocols and Cipher Suites (Disables weak SSL/TLSv1)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ==========================================================================
    # GZIP COMPRESSION CONFIGURATION
    # ==========================================================================
    # Compression reduces bandwidth and speeds up page load times for text assets.
    # ==========================================================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;      # Only compress responses greater than 1KB
    gzip_proxied any;          # Compress proxy requests

    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # ==========================================================================
    # REVERSE PROXY ROUTING
    # ==========================================================================
    # Forwards dynamic requests to Gunicorn backend servers.
    # ==========================================================================
    location / {
        proxy_pass http://django_servers;
        
        # Headers to preserve client context for Django
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # Tells Django if connection was HTTPS
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # ==========================================================================
    # STATIC FILE HANDLING & BROWSER CACHING
    # ==========================================================================
    # Serve static assets directly from disk instead of hitting Gunicorn.
    # We add browser cache headers since static assets rarely change.
    # ==========================================================================
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;            # Instructs browsers to cache static files for 30 days
        add_header Cache-Control "public, no-transform";
    }
}
